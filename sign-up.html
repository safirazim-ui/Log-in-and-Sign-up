<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="icon" href="img/image.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Theme Toggle -->
  <div class="toggle">
    <button id="themeToggle">
      <img id="themeIcon" src="img/light.png" alt="Toggle theme">
    </button>
  </div>

  <div class="container">
    <div class="glass-box">
      <h2>Sign Up</h2>

      <form id="signupForm">
        <div class="input-box">
          <input type="text" id="username" required>
          <label>Create your username</label>
        </div>

        <div class="input-box">
          <input type="password" id="password" required>
          <label>Create your password</label>
        </div>

        <button type="submit">Sign Up</button>
      </form>

      <p id="message"></p>

      <div class="divider">Or Sign Up with</div>

      <div class="login-options">
        <button class="login-btn blue-btn" id="baseLibreBtn">
          <img src="img/image.png" alt="BaseLibre logo" class="btn-icon">
          BaseLibre
        </button>
      </div>

      <div class="login-options">
        <button class="login-btn google-btn" id="googleBtn">
          <img src="img/google.png" alt="Google logo" class="btn-icon">
          Google
        </button>
        <button class="login-btn email-btn" id="emailBtn">
          <img src="img/mail.png" alt="Mail logo" class="btn-icon">
          Email
        </button>
      </div>

      <div class="auth-links">
        <p><a href="log-in.html">Already have a account? Login!</a></p>
        <p><a href="#">Forgot Password?</a></p>
      </div>
    </div>
  </div>

  <!-- Attribution Link -->
  <a href="https://pngtree.com/freebackground/abstract-simple-rectangle-gray-background_1459664.html" id="attribution-link" target="_blank">Background Source</a>
  <a href="https://www.magnific.com/free-vector/wave-dark-gradient-background-desogn_415791058.htm#fromView=keyword&page=1&position=4&uuid=661e7a38-54d2-4a83-a744-8eea18ea7165&query=Dark+gray+abstract" id="attribution-link-dark" target="_blank">Background Source</a>

  <!-- Vanilla Tilt -->
  <script src="vanilla-tilt.js"></script>
  <script src="script.js"></script>
</body>
</html>
